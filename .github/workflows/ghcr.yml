name: Web FE Lint

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Flutter
        if: hashFiles('flutter/**') != ''
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run web build
        run: npm run build

      - name: Flutter pub get
        if: hashFiles('flutter/**') != ''
        working-directory: flutter
        run: flutter pub get

      - name: Flutter analyze
        if: hashFiles('flutter/**') != ''
        working-directory: flutter
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        if: hashFiles('flutter/**') != ''
        working-directory: flutter
        run: flutter test

      - name: Flutter build web --release
        if: hashFiles('flutter/**') != ''
        working-directory: flutter
        run: flutter build web --release
